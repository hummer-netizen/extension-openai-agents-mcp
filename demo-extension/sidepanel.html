<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #e0e0e0; font-size: 14px; display: flex; flex-direction: column;
    height: 100vh; background: #0f0f1a;
  }
  .header { padding: 12px 16px; border-bottom: 1px solid #1a1a2e; }
  h2 { font-size: 16px; color: #10a37f; margin-bottom: 2px; }
  .sub { font-size: 11px; color: #666; }

  #messages { flex: 1; overflow-y: auto; padding: 12px 16px; scroll-behavior: smooth; }
  .msg { padding: 8px 12px; margin: 6px 0; border-radius: 12px; font-size: 13px; line-height: 1.5; }
  .msg.user { background: #1a2e1a; margin-left: 40px; text-align: right; color: #ccc; }
  .msg.ai { background: #1a1a2e; margin-right: 20px; }
  .msg.tool { background: transparent; font-size: 11px; color: #555; margin: 2px 0; font-style: italic; }

  .typing { color: #10a37f; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  #examples { padding: 8px 16px; }
  #examples p { font-size: 11px; color: #555; margin-bottom: 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 6px 10px; border-radius: 8px;
    background: rgba(16,163,127,0.1); border: 1px solid #1a3a2e;
    font-size: 11px; color: #10a37f; cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .chip:hover { background: rgba(16,163,127,0.2); border-color: #10a37f; color: #fff; }
  .chip.featured { background: rgba(16,163,127,0.2); border-color: #10a37f; color: #fff; font-weight: 600; }
  #chipToggle { display: none; text-align: center; padding: 4px 16px; }
  #chipToggle .chip { font-style: italic; }

  footer {
    padding: 8px 12px; border-top: 1px solid #1a1a2e;
    display: flex; gap: 8px; background: #0a0a14;
  }
  input {
    flex: 1; padding: 8px 12px; border-radius: 8px;
    border: 1px solid #2a2a4a; background: #1a1a2e; color: #e0e0e0;
    font-size: 13px; outline: none; font-family: inherit;
  }
  input:focus { border-color: #10a37f; }
  button {
    padding: 6px 16px; border: none; border-radius: 8px;
    background: #10a37f; color: #fff; font-weight: 600;
    cursor: pointer; font-size: 13px; font-family: inherit;
  }
  button:hover { background: #0d8a6a; }
  button:disabled { background: #333; cursor: not-allowed; }

  .powered { text-align: center; padding: 4px; font-size: 10px; color: #333; }
  .powered a { color: #10a37f; text-decoration: none; }
  .msg.ai ol, .msg.ai ul { margin: 4px 0; padding-left: 20px; }
  .msg.ai li { margin: 2px 0; }
  .msg.ai a { color: #8b5cf6; text-decoration: none; }
  .msg.ai a:hover { text-decoration: underline; }
  .msg.ai code { background: rgba(255,255,255,0.1); padding: 1px 3px; border-radius: 2px; font-size: 0.9em; }
  .msg.ai hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 6px 0; }
  .bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px; border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 8pt; color: #888;
  }
  .bottom-bar a { color: #8b5cf6; text-decoration: none; cursor: pointer; }
  .bottom-bar a:hover { text-decoration: underline; }
  .clone-btn {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
    font-size: 8pt; color: #888; cursor: pointer;
    text-decoration: none; transition: all 0.1s;
  }
  .clone-btn:hover { border-color: #8b5cf6; color: #fff; background: rgba(139,92,246,0.1); text-decoration: none; }
  .clone-btn svg { width: 12px; height: 12px; }
</style>
</head>
<body>
  <div class="header">
    <h2>🤖 OpenAI Agent</h2>
    <p class="sub">AI agent powered by OpenAI Agents SDK + Webfuse MCP</p>
  </div>
  <div id="messages"></div>
  <div id="examples">
    <p>try one:</p>
    <div class="chips" id="chipList">
      <span class="chip featured" onclick="askExample(this)">😂 Write a funny comment on #1</span>
      <span class="chip" onclick="askExample(this)">💬 Show comments on #1</span>
      <span class="chip" onclick="askExample(this)">👀 Open the top story</span>
      <span class="chip" onclick="askExample(this)">🔥 What's trending?</span>
      <span class="chip" onclick="askExample(this)">📋 Summarize top 5</span>
      <span class="chip" onclick="askExample(this)">🤖 Any AI posts?</span>
      <span class="chip" onclick="askExample(this)">🏆 Most upvoted?</span>
    </div>
  </div>
  <footer>
    <input id="input" placeholder="ask me anything about this page…" autofocus>
    <button id="send" onclick="sendMessage()">send</button>
  </footer>
  <div class="bottom-bar">
    <span>powered by <a data-href="https://webfuse.com" onclick="window.open(this.dataset.href,'_blank')">webfuse</a> + <a data-href="https://platform.openai.com/docs/guides/agents-sdk" onclick="window.open(this.dataset.href,'_blank')">openai agents sdk</a></span>
    <a class="clone-btn" data-href="https://github.com/hummer-netizen/extension-openai-agents-mcp" onclick="window.open(this.dataset.href,'_blank')">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      clone it
    </a>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
