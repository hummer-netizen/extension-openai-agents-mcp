<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenAI Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      width: 420px;
      height: 620px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: #7c3aed;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      flex: 1;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      transition: background 0.3s;
    }

    .status-dot.working {
      background: #facc15;
      animation: pulse 1s infinite;
    }

    .status-dot.error {
      background: #f87171;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 2px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #7c3aed;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.agent {
      align-self: flex-start;
      background: #16213e;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
      border: 1px solid #0f3460;
    }

    .msg.agent .tool-pill {
      display: inline-block;
      background: #0f3460;
      color: #a78bfa;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      font-family: monospace;
    }

    /* Welcome */
    .welcome {
      text-align: center;
      color: #888;
      font-size: 13px;
      padding: 40px 20px;
    }

    .welcome .icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #16213e;
      border-top: 1px solid #0f3460;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #7c3aed;
    }

    .input-area input::placeholder {
      color: #666;
    }

    .input-area button {
      padding: 10px 16px;
      border-radius: 12px;
      border: none;
      background: #7c3aed;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #6d28d9;
    }

    .input-area button:disabled {
      background: #333;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-title">OpenAI Agent</div>
    <div class="status-dot" id="statusDot" title="Ready"></div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">🌐</div>
      <div>Ask me to do anything on this page.<br>I can see, click, type, navigate, and extract data.</div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask the agent..." autocomplete="off" />
    <button id="sendBtn">Send</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
